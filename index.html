<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<title>Mochila Digital PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#f5f3ff;
}

/* CAPA */
.capa{
  height:220px;
  background:
    linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.5)),
    url('https://img.a.transfermarkt.technology/portrait/header/476761-1691506765.jpg') center/cover no-repeat;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

.capa h1{
  background:rgba(0,0,0,0.5);
  color:#fff;
  padding:10px 20px;
  border-radius:12px;
  margin-bottom:15px;
}

/* TOPO */
.topbar{
  padding:20px;
}

.topbar h2{
  color:#6d28d9;
}

/* BOTÕES */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#a78bfa;
  color:white;
  cursor:pointer;
  font-size:13px;
}

button:hover{
  background:#8b5cf6;
}

/* DASHBOARD */
.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  padding:0 20px 20px;
}

.dash-card{
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  color:#6d28d9;
}

/* CONTAINER */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

/* CARDS */
.card{
  background:white;
  border-radius:16px;
  padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

h2{
  color:#7c3aed;
  margin-bottom:10px;
}

/* INPUTS */
input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* MATÉRIAS */
.subject{
  background:#ede9fe;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}

.item{
  background:#ddd6fe;
  margin-top:6px;
  padding:8px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.delete-btn{
  background:#ef4444;
  font-size:12px;
  padding:5px 8px;
}
</style>
</head>

<body>

<div class="capa">
  <h1>🎒 Mochila Digital PRO</h1>
</div>

<div class="topbar">
  <h2 id="userNome">Olá 👋</h2>
  <p id="userInfo"></p>
</div>

<div class="dashboard">
  <div class="dash-card" id="tarefasDash">📚 0</div>
</div>

<div class="container">

<div class="card">
<h2>👤 Info</h2>
<input id="nome" placeholder="Nome">
<input id="turma" placeholder="Turma">
<input id="escola" placeholder="Escola">
<button onclick="salvarInfo()">Salvar</button>
</div>

<div class="card">
<h2>📚 Matérias</h2>
<input id="materiaNome" placeholder="Matéria">
<select id="categoria">
<option>Exatas</option>
<option>Humanas</option>
<option>Curso</option>
</select>
<input id="inputGlobal" placeholder="Adicionar tarefa">
<button onclick="addMateria()">Adicionar Matéria</button>
<div id="pastas"></div>
</div>

</div>

<script>
let data = {
  materias:{Exatas:[],Humanas:[],Curso:[]},
  info:{}
};

const nomeInput = document.getElementById("nome");
const turmaInput = document.getElementById("turma");
const escolaInput = document.getElementById("escola");
const materiaNomeInput = document.getElementById("materiaNome");
const categoriaSelect = document.getElementById("categoria");
const inputGlobal = document.getElementById("inputGlobal");
const pastasDiv = document.getElementById("pastas");
const userInfo = document.getElementById("userInfo");
const tarefasDash = document.getElementById("tarefasDash");

function salvarLocal(){
  localStorage.setItem('mochila', JSON.stringify(data));
}

function carregarLocal(){
  let d = localStorage.getItem('mochila');
  if(d){
    let parsed = JSON.parse(d);
    data.materias = parsed.materias || {Exatas:[],Humanas:[],Curso:[]};
    data.info = parsed.info || {};
  }
}
carregarLocal();

function salvarInfo(){
  data.info = {
    nome: nomeInput.value,
    turma: turmaInput.value,
    escola: escolaInput.value
  };
  salvarLocal();
  render();
}

function addMateria(){
  if(!materiaNomeInput.value) return;

  data.materias[categoriaSelect.value].push({
    nome: materiaNomeInput.value,
    tarefas:[]
  });

  materiaNomeInput.value='';
  salvarLocal();
  render();
}

function addItem(cat,i){
  let txt = inputGlobal.value;
  if(!txt) return;

  data.materias[cat][i].tarefas.push(txt);
  inputGlobal.value='';
  salvarLocal();
  render();
}

function removerMateria(cat,i){
  data.materias[cat].splice(i,1);
  salvarLocal();
  render();
}

function removerTarefa(cat,i,ti){
  data.materias[cat][i].tarefas.splice(ti,1);
  salvarLocal();
  render();
}

function atualizarDashboard(){
  let tarefas = 0;

  for(let c in data.materias){
    data.materias[c].forEach(m=>{
      tarefas += m.tarefas.length;
    });
  }

  tarefasDash.innerText = "📚 " + tarefas;
}

function render(){
  userInfo.innerText = data.info.nome 
    ? `${data.info.nome} - ${data.info.turma}` 
    : '';

  pastasDiv.innerHTML = '';

  for(let cat in data.materias){
    data.materias[cat].forEach((m,i)=>{

      let tarefas = m.tarefas.map((t,ti)=>`
      <div class='item'>
        ${t}
        <button class="delete-btn" onclick="removerTarefa('${cat}',${i},${ti})">❌</button>
      </div>`).join('');

      pastasDiv.innerHTML += `
      <div class='subject'>
        <b>${m.nome}</b>
        <div style="margin-top:8px;">
          <button onclick="addItem('${cat}',${i})">+ Tarefa</button>
          <button class="delete-btn" onclick="removerMateria('${cat}',${i})">Excluir</button>
        </div>
        ${tarefas}
      </div>`;
    });
  }

  atualizarDashboard();
}

render();
</script>

</body>
</html>
