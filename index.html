```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
display:flex;
background:#F8FAFC;
color:#111827;
}

/* SIDEBAR */
.sidebar{
width:80px;
background:white;
height:100vh;
box-shadow:0 0 25px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:20px;
position:fixed;
}

.sidebar button{
background:none;
border:none;
font-size:22px;
cursor:pointer;
color:#7C3AED;
}

/* MAIN */
.main{
margin-left:80px;
width:100%;
}

/* HEADER */
.header{
height:80px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#7C3AED;
color:white;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:5px;
}

button{
margin-top:8px;
padding:8px;
border:none;
border-radius:10px;
background:#7C3AED;
color:white;
cursor:pointer;
}

/* materia */
.materia{
background:#f5f3ff;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.aula{
background:#ede9fe;
padding:8px;
border-radius:8px;
margin-top:5px;
}

.delete{
background:#ef4444;
}

/* tarefas */
.tarefa{
display:flex;
justify-content:space-between;
background:#ede9fe;
padding:8px;
border-radius:8px;
margin-top:5px;
}

/* horario */
table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:8px;
}

td input{
width:100%;
}

/* modal perfil */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.3);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:15px;
width:300px;
}

/* FAB */
.fab{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#7C3AED;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="show('materias')">📚</button>
<button onclick="show('tarefas')">📝</button>
<button onclick="show('horario')">⏰</button>
<button onclick="show('perfil')">👤</button>
</div>

<div class="main">

<div class="header">
<h2 id="nomeTopo">Minha Mochila</h2>
<div class="avatar" onclick="abrirPerfil()">U</div>
</div>

<div class="dashboard">
<div class="card">Matérias <h3 id="totalMaterias">0</h3></div>
<div class="card">Tarefas <h3 id="totalTarefas">0</h3></div>
<div class="card">Nome <h3 id="nomeDash">-</h3></div>
<div class="card">Hoje <h3 id="dataHoje"></h3></div>
</div>

<div class="container">

<!-- MATERIAS -->
<div class="card" id="materias">
<h2>Matérias</h2>

<input id="novaMateria" placeholder="Nova matéria">
<button onclick="addMateria()">Adicionar matéria</button>

<div id="listaMaterias"></div>
</div>

<!-- TAREFAS -->
<div class="card" id="tarefas">
<h2>Tarefas</h2>

<input id="novaTarefa" placeholder="Nova tarefa">
<button onclick="addTarefa()">Adicionar tarefa</button>

<div id="listaTarefas"></div>
</div>

<!-- HORARIO -->
<div class="card" id="horario">
<h2>Horário</h2>

<table>
<tr>
<th></th>
<th>Seg</th>
<th>Ter</th>
<th>Qua</th>
<th>Qui</th>
<th>Sex</th>
</tr>

<tr>
<td>1ª</td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
</tr>

<tr>
<td>2ª</td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
</tr>

<tr>
<td>3ª</td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
<td><input></td>
</tr>
</table>

</div>

</div>

</div>

<!-- PERFIL -->
<div class="modal" id="perfilModal">
<div class="modal-box">
<h3>Perfil</h3>

<input id="nomeUser" placeholder="Seu nome">

<button onclick="salvarPerfil()">Salvar</button>
</div>
</div>

<div class="fab" onclick="menu()">+</div>

<script>
let data={
materias:[],
tarefas:[],
nome:""
}

dataHoje.innerText=new Date().toLocaleDateString()

function addMateria(){
let nome=novaMateria.value
if(!nome)return

data.materias.push({
nome,
aulas:[]
})

novaMateria.value=''
render()
}

function addAula(i){
let txt=prompt("O que aconteceu na aula?")
if(!txt)return

data.materias[i].aulas.push(txt)
render()
}

function excluirMateria(i){
data.materias.splice(i,1)
render()
}

function addTarefa(){
let t=novaTarefa.value
if(!t)return

data.tarefas.push(t)
novaTarefa.value=''
render()
}

function abrirPerfil(){
perfilModal.style.display="flex"
}

function salvarPerfil(){
data.nome=nomeUser.value
perfilModal.style.display="none"
render()
}

function menu(){
alert("Use para adicionar matéria ou tarefa")
}

function render(){

listaMaterias.innerHTML=''
listaTarefas.innerHTML=''

data.materias.forEach((m,i)=>{

let aulas=m.aulas.map(a=>
`<div class="aula">${a}</div>`
).join('')

listaMaterias.innerHTML+=`
<div class="materia">
<strong>${m.nome}</strong>

<button onclick="addAula(${i})">+ aula</button>
<button class="delete" onclick="excluirMateria(${i})">Excluir</button>

${aulas}
</div>
`
})

data.tarefas.forEach(t=>{
listaTarefas.innerHTML+=`
<div class="tarefa">${t}</div>`
})

totalMaterias.innerText=data.materias.length
totalTarefas.innerText=data.tarefas.length

nomeTopo.innerText=data.nome || "Minha Mochila"
nomeDash.innerText=data.nome || "-"

localStorage.setItem("mochila",JSON.stringify(data))
}

let saved=localStorage.getItem("mochila")
if(saved)data=JSON.parse(saved)

render()
</script>

</body>
</html>
```
