<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital Pro+</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --roxo:#ede9fe;
  --roxo2:#a78bfa;
  --amarelo:#fff9db;
  --bg:#faf9ff;
  --card:#ffffff;
  --text:#1f1f1f;
}

body.dark{
  --bg:#1e1b2e;
  --card:#2a2540;
  --text:#fff;
}

*{font-family:'Outfit',sans-serif;box-sizing:border-box;margin:0;transition:0.3s}

body{display:flex;background:var(--bg);color:var(--text)}

.sidebar{
  width:240px;
  background:var(--roxo2);
  height:100vh;
  padding:20px;
  color:white;
}

.sidebar button{
  width:100%;padding:10px;margin:5px 0;
  border:none;border-radius:10px;
  background:rgba(255,255,255,0.2);
  color:white;cursor:pointer;
}

.main{flex:1;padding:20px}

.header h1{font-size:26px;color:#7c6cff}
.header p{opacity:.6;margin-bottom:15px}

.card{
  background:var(--card);
  padding:15px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.subject{
  background:var(--roxo);
  border-radius:15px;
  padding:10px;
  min-height:230px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.subject input{border:none;background:transparent;font-weight:bold}

.task-item{
  display:flex;align-items:center;gap:5px;margin-top:5px;
}

.task-item input[type="text"]{flex:1}

.done{text-decoration:line-through;opacity:0.5}

input,textarea{
  width:100%;padding:6px;margin-top:5px;
  border-radius:8px;border:1px solid #ddd;
}

textarea{height:60px}

button{
  margin-top:5px;padding:6px;
  border:none;border-radius:8px;
  background:#a78bfa;color:white;cursor:pointer;
}

.delete{background:#ff6b6b}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.day{
  background:var(--amarelo);
  padding:10px;border-radius:8px;
  text-align:center;cursor:pointer;
}

.day.active{background:#a78bfa;color:white}

.schedule{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:5px;
}

.cell{
  background:#eee;padding:10px;
  border-radius:8px;text-align:center;
}

</style>
</head>
<body>

<div class="sidebar">
  <button onclick="show('materias')">Matérias</button>
  <button onclick="show('calendario')">Provas</button>
  <button onclick="show('horario')">Horário</button>
  <button onclick="show('dados')">Dados</button>
  <button onclick="show('anotacoes')">Anotações</button>
  <button onclick="toggleDark()">🌙</button>
</div>

<div class="main" id="app">

<div class="header">
  <h1>Mochila Digital da Maria</h1>
  <p>Organize seus estudos como um profissional ✨</p>
</div>

<div id="materias">
  <div class="card"><h2>Exatas</h2><button onclick="add('exatas')">+ Matéria</button><div class="grid" id="exatas"></div></div>
  <div class="card"><h2>Humanas</h2><button onclick="add('humanas')">+ Matéria</button><div class="grid" id="humanas"></div></div>
  <div class="card"><h2>Itinerário</h2><button onclick="add('itinerario')">+ Matéria</button><div class="grid" id="itinerario"></div></div>
  <div class="card"><h2>Curso</h2><button onclick="add('curso')">+ Matéria</button><div class="grid" id="curso"></div></div>
</div>

<div id="calendario" style="display:none">
  <div class="card">
    <h2>Calendário de Provas</h2>
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<div id="horario" style="display:none">
  <div class="card">
    <h2>Horário de Aula</h2>
    <div class="schedule" id="schedule"></div>
  </div>
</div>

<div id="dados" style="display:none">
  <div class="card">
    <h2>Dados Pessoais</h2>
    <input placeholder="Nome">
    <input placeholder="Escola">
    <input placeholder="Turma">
  </div>
</div>

<div id="anotacoes" style="display:none">
  <div class="card">
    <h2>Anotações</h2>
    <textarea placeholder="Escreva aqui..."></textarea>
  </div>
</div>

</div>

<script>
function show(id){
  ['materias','calendario','horario','dados','anotacoes'].forEach(s=>{
    document.getElementById(s).style.display='none';
  });
  document.getElementById(id).style.display='block';
}

function add(cat){
  let div=document.createElement('div');
  div.className='subject';
  div.innerHTML=`
    <input placeholder='Matéria'>
    <div class='tasks'>
      <button onclick='addTask(this)'>+ tarefa</button>
    </div>
    <div class='diary'>
      <textarea placeholder='Diário da aula'></textarea>
    </div>
    <button class='delete' onclick='this.parentElement.remove();save()'>Excluir</button>
  `;
  document.getElementById(cat).appendChild(div);
  save();
}

function addTask(btn){
  let div=document.createElement('div');
  div.className='task-item';
  div.innerHTML=`
    <input type='checkbox' onchange='toggleDone(this)'>
    <input type='text' placeholder='Tarefa'>
    <button class='delete' onclick='this.parentElement.remove();save()'>X</button>
  `;
  btn.parentElement.appendChild(div);
  save();
}

function toggleDone(cb){
  let text=cb.nextElementSibling;
  text.classList.toggle('done');
  save();
}

function toggleDark(){
  document.body.classList.toggle('dark');
  localStorage.setItem('dark',document.body.classList.contains('dark'));
}

function save(){
  localStorage.setItem('app',document.getElementById('app').innerHTML);
}

function load(){
  if(localStorage.getItem('app')){
    document.getElementById('app').innerHTML=localStorage.getItem('app');
  }
  if(localStorage.getItem('dark')==='true'){
    document.body.classList.add('dark');
  }
}

// calendário
for(let i=1;i<=31;i++){
  let d=document.createElement('div');
  d.className='day';
  d.innerText=i;
  d.onclick=()=>{d.classList.toggle('active');save();};
  document.getElementById('calendar').appendChild(d);
}

// horario
for(let i=0;i<25;i++){
  let c=document.createElement('div');
  c.className='cell';
  c.contentEditable=true;
  c.oninput=save;
  document.getElementById('schedule').appendChild(c);
}

window.onload=load;
document.addEventListener('input',save);
</script>

</body>
</html>
