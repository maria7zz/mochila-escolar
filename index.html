<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital MAX+</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --roxo:#ede9fe;
  --roxo2:#8b5cf6;
  --amarelo:#fff9db;
  --bg:#fbfaff;
  --card:#ffffff;
  --text:#1f1f1f;
}

body.dark{
  --bg:#1e1b2e;
  --card:#2a2540;
  --text:#fff;
}

*{font-family:'Outfit',sans-serif;margin:0;box-sizing:border-box;transition:.3s}
body{display:flex;background:var(--bg);color:var(--text)}

.sidebar{width:250px;background:linear-gradient(180deg,#8b5cf6,#a78bfa);padding:20px;color:white;height:100vh}
.sidebar button{width:100%;margin:6px 0;padding:10px;border:none;border-radius:10px;background:rgba(255,255,255,0.2);color:white;cursor:pointer}

.main{flex:1;padding:20px}
.card{background:var(--card);padding:20px;border-radius:15px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,.08)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.subject{padding:15px;border-radius:15px;min-height:300px;display:flex;flex-direction:column;gap:10px}
.color-1{background:#ede9fe}.color-2{background:#e0f2fe}.color-3{background:#dcfce7}.color-4{background:#fef3c7}.color-5{background:#ffe4e6}

.task{background:#fff;padding:8px;border-radius:10px}
.done{text-decoration:line-through;opacity:.5}

input,textarea{width:100%;padding:6px;border-radius:8px;border:1px solid #ddd;margin-top:5px}
button{margin-top:5px;padding:6px;border:none;border-radius:8px;background:#8b5cf6;color:white;cursor:pointer}
.delete{background:#ff6b6b}

.calendar,.attendance{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day{padding:10px;border-radius:8px;text-align:center;cursor:pointer;background:#eee}
.prova{background:#8b5cf6;color:white}
.presente{background:#c4b5fd}
.falta{background:#fff9db}

.schedule{display:grid;grid-template-columns:repeat(10,1fr);gap:5px}
.cell{padding:10px;background:#eee;border-radius:8px}

</style>
</head>
<body>

<div class="sidebar">
<button onclick="show('materias')">Matérias</button>
<button onclick="show('metas')">Metas</button>
<button onclick="show('calendario')">Provas</button>
<button onclick="show('frequencia')">Frequência</button>
<button onclick="show('horario')">Horário</button>
<button onclick="toggleDark()">🌙</button>
</div>

<div class="main" id="app">

<h1>Mochila Digital da Maria</h1>
<p>Alta performance começa com organização 💜</p>

<div id="materias">
<div class="card"><h2>Exatas</h2><button onclick="add('exatas')">+ Matéria</button><div class="grid" id="exatas"></div></div>
</div>

<div id="metas" style="display:none">
<div class="card">
<h2>Metas</h2>
<button onclick="addMeta()">+ Meta</button>
<div id="metasList"></div>
</div>
</div>

<div id="calendario" style="display:none">
<div class="card">
<h2>Calendário de Provas</h2>
<div class="calendar" id="calendar"></div>
</div>
</div>

<div id="frequencia" style="display:none">
<div class="card">
<h2>Frequência</h2>
<div class="attendance" id="attendance"></div>
<p>🟪 Presente | 🟨 Falta</p>
</div>
</div>

<div id="horario" style="display:none">
<div class="card">
<h2>Horário</h2>
<div class="schedule" id="schedule"></div>
</div>
</div>

</div>

<script>
function show(id){['materias','metas','calendario','frequencia','horario'].forEach(s=>document.getElementById(s).style.display='none');document.getElementById(id).style.display='block'}

function add(cat){const colors=['color-1','color-2','color-3','color-4','color-5'];let d=document.createElement('div');d.className='subject '+colors[Math.floor(Math.random()*colors.length)];d.innerHTML=`<input placeholder='Matéria'><button onclick='addTask(this)'>+ tarefa</button><textarea placeholder='Diário'></textarea><button class='delete' onclick='this.parentElement.remove();save()'>Excluir</button>`;document.getElementById(cat).appendChild(d);save()}

function addTask(btn){let t=document.createElement('div');t.className='task';t.innerHTML=`<input type='checkbox' onchange='this.nextElementSibling.classList.toggle("done")'><input placeholder='Tarefa'><textarea placeholder='Detalhes'></textarea>`;btn.parentElement.appendChild(t);save()}

function addMeta(){let m=document.createElement('div');m.className='task';m.innerHTML=`<input placeholder='Meta'><textarea placeholder='Descrição'></textarea><button class='delete' onclick='this.parentElement.remove();save()'>Excluir</button>`;document.getElementById('metasList').appendChild(m);save()}

// calendário provas
for(let i=1;i<=31;i++){let d=document.createElement('div');d.className='day';d.innerText=i;d.onclick=()=>d.classList.toggle('prova');document.getElementById('calendar').appendChild(d)}

// frequência
for(let i=1;i<=31;i++){let d=document.createElement('div');d.className='day';d.innerText=i;d.onclick=()=>{
 if(d.classList.contains('presente')){d.classList.remove('presente');d.classList.add('falta')}
 else if(d.classList.contains('falta')){d.classList.remove('falta')}
 else{d.classList.add('presente')}
 save()
};document.getElementById('attendance').appendChild(d)}

// horario
for(let i=0;i<30;i++){let c=document.createElement('div');c.className='cell';c.contentEditable=true;c.oninput=save;document.getElementById('schedule').appendChild(c)}

function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('dark',document.body.classList.contains('dark'))}

function save(){localStorage.setItem('app',document.getElementById('app').innerHTML)}
function load(){if(localStorage.getItem('app'))document.getElementById('app').innerHTML=localStorage.getItem('app');if(localStorage.getItem('dark')==='true')document.body.classList.add('dark')}

window.onload=load;document.addEventListener('input',save)
</script>

</body>
</html>
