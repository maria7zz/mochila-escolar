<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mochila Digital PRO</title>
  <style>
    body {margin:0;font-family: 'Segoe UI',sans-serif;background:linear-gradient(135deg,#5b21b6,#e9d5ff);}    
    header {background:#4c1d95;color:#fff;padding:20px;text-align:center;font-size:26px;font-weight:bold;letter-spacing:1px;}
    .container {display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;padding:20px;}
    .card {background:#fff;border-radius:16px;padding:20px;box-shadow:0 8px 20px rgba(0,0,0,0.15);}    
    h2 {color:#6d28d9;margin-bottom:10px;}
    input,textarea,select {width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ccc;}
    button {margin-top:8px;padding:10px;border:none;border-radius:8px;background:#6d28d9;color:white;cursor:pointer;font-weight:bold;}
    button:hover {background:#4c1d95;}
    .subject {background:#f5f3ff;margin-top:10px;padding:10px;border-radius:10px;}
    .item {background:#ede9fe;margin-top:5px;padding:8px;border-radius:6px;display:flex;justify-content:space-between;}
    .folder {margin-top:10px;padding:10px;border:2px dashed #c4b5fd;border-radius:10px;}
    .grid-horario {display:grid;grid-template-columns:repeat(9,1fr);gap:5px;margin-top:10px;}
    .aula {background:#ddd;padding:10px;border-radius:6px;text-align:center;font-size:12px;cursor:pointer;}
    .dia {margin-top:10px;}
  </style>
</head>
<body>
<header>🎒 Mochila Digital PRO</header>
<div class="container">

<!-- INFO -->
<div class="card">
<h2>👤 Informações</h2>
<input id="nome" placeholder="Nome">
<input id="turma" placeholder="Turma">
<input id="escola" placeholder="Escola">
<button onclick="salvarInfo()">Salvar</button>
<p id="info"></p>
</div>

<!-- MATERIAS -->
<div class="card">
<h2>📚 Matérias</h2>
<input id="materiaNome" placeholder="Nome da matéria">
<select id="categoria">
<option>Exatas</option>
<option>Humanas</option>
<option>Itinerário</option>
<option>Curso</option>
</select>
<button onclick="addMateria()">Adicionar</button>
<div id="pastas"></div>
</div>

<!-- HORARIO -->
<div class="card">
<h2>📅 Horário Escolar</h2>
<div id="horario"></div>
</div>

<!-- PRESENÇA -->
<div class="card">
<h2>✅ Presença / Falta</h2>
<input id="dataPresenca" type="date">
<select id="statusPresenca">
<option>Presente</option>
<option>Falta</option>
</select>
<button onclick="addPresenca()">Adicionar</button>
<div id="listaPresenca"></div>
</div>

<!-- SAUDE MENTAL -->
<div class="card">
<h2>💜 Saúde Mental</h2>
<input id="dataHumor" type="date">
<select id="humor">
<option>😀 Feliz</option>
<option>😐 Normal</option>
<option>😢 Triste</option>
<option>😡 Estressado</option>
</select>
<button onclick="addHumor()">Registrar</button>
<div id="listaHumor"></div>
</div>

<!-- PROVAS -->
<div class="card">
<h2>📝 Provas</h2>
<input id="dataProva" type="date">
<input id="nomeProva" placeholder="Nome da prova">
<button onclick="addProva()">Adicionar</button>
<div id="listaProvas"></div>
</div>

</div>

<script>
// STORAGE
function salvarLocal(){localStorage.setItem('mochila',JSON.stringify(data));}
function carregarLocal(){let d=localStorage.getItem('mochila'); if(d){data=JSON.parse(d);}}

let data={materias:{Exatas:[],Humanas:[],"Itinerário":[],Curso:[]},presenca:[],humor:[],provas:[],horario:{}};
carregarLocal();

function salvarInfo(){
let n=nome.value,t=turma.value,e=escola.value;
info.innerText=`${n} - ${t} - ${e}`;
}

function addMateria(){
let nomeM=materiaNome.value;
let cat=categoria.value;
if(!nomeM)return;
data.materias[cat].push({nome:nomeM,diario:[],tarefas:[]});
salvarLocal();render();
}

function addItem(tipo,cat,i){
let txt=prompt('Digite'); if(!txt)return;
data.materias[cat][i][tipo].push(txt);
salvarLocal();render();
}

function removerItem(tipo,cat,i,j){data.materias[cat][i][tipo].splice(j,1);salvarLocal();render();}
function removerMateria(cat,i){data.materias[cat].splice(i,1);salvarLocal();render();}

function render(){
pastas.innerHTML='';
for(let cat in data.materias){
let f=document.createElement('div'); f.className='folder'; f.innerHTML=`<h3>${cat}</h3>`;
data.materias[cat].forEach((m,i)=>{
let d=m.diario.map((x,j)=>`<div class='item'>${x}<button onclick="removerItem('diario','${cat}',${i},${j})">X</button></div>`).join('');
let t=m.tarefas.map((x,j)=>`<div class='item'>${x}<button onclick="removerItem('tarefas','${cat}',${i},${j})">X</button></div>`).join('');
f.innerHTML+=`<div class='subject'><b>${m.nome}</b>
<button onclick="removerMateria('${cat}',${i})">Remover</button>
<br><button onclick="addItem('diario','${cat}',${i})">+ Diário</button>
<button onclick="addItem('tarefas','${cat}',${i})">+ Tarefa</button>
<div>📓${d}</div><div>✅${t}</div></div>`;
});
pastas.appendChild(f);
}
renderExtras();
}

// PRESENÇA
function addPresenca(){
data.presenca.push({d:dataPresenca.value,s:statusPresenca.value});salvarLocal();renderExtras();}

// HUMOR
function addHumor(){
data.humor.push({d:dataHumor.value,h:humor.value});salvarLocal();renderExtras();}

// PROVAS
function addProva(){
data.provas.push({d:dataProva.value,n:nomeProva.value});salvarLocal();renderExtras();}

function renderExtras(){
listaPresenca.innerHTML=data.presenca.map((x,i)=>`<div class='item'>${x.d} - ${x.s}</div>`).join('');
listaHumor.innerHTML=data.humor.map(x=>`<div class='item'>${x.d} - ${x.h}</div>`).join('');
listaProvas.innerHTML=data.provas.map(x=>`<div class='item'>${x.d} - ${x.n}</div>`).join('');
}

// HORARIO
let dias=['Seg','Ter','Qua','Qui','Sex'];
function renderHorario(){
horario.innerHTML='';
dias.forEach(d=>{
let div=document.createElement('div'); div.className='dia';
div.innerHTML=`<b>${d}</b><div class='grid-horario'>${Array(9).fill(0).map((_,i)=>`<div class='aula' onclick="editarAula('${d}',${i})">${(data.horario[d]&&data.horario[d][i])||'+'}</div>`).join('')}</div>`;
horario.appendChild(div);
});
}

function editarAula(d,i){
let txt=prompt('Nome da aula'); if(!data.horario[d])data.horario[d]=[];
data.horario[d][i]=txt; salvarLocal(); renderHorario();
}

render(); renderHorario();
</script>
</body>
</html>
