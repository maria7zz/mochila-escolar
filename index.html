<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital Girl 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background: linear-gradient(135deg,#f3e8ff,#ede9fe);
}

.capa{
height:180px;
background:linear-gradient(135deg,#c084fc,#a78bfa);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:24px;
font-weight:600;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
color:#7c3aed;
margin-bottom:12px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:8px;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:12px;
background:#c084fc;
color:white;
cursor:pointer;
width:100%;
}

.subject{
background:#f5f3ff;
padding:15px;
border-radius:15px;
margin-top:15px;
}

.item{
background:#ede9fe;
padding:10px;
border-radius:10px;
margin-top:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete-btn{
background:#fb7185;
border:none;
padding:5px 10px;
border-radius:8px;
color:white;
cursor:pointer;
}

.done{
text-decoration:line-through;
opacity:0.6;
}

@media(max-width:800px){
.container{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="capa">✨ Minha Mochila Digital ✨</div>

<div class="container">

<div class="card">
<h2>📚 Matérias & Tarefas</h2>

<input id="pesquisa" placeholder="Pesquisar...">

<input id="materiaNome" placeholder="Nome da matéria">
<textarea id="tarefaInput" placeholder="Tarefa inicial"></textarea>

<button onclick="addMateria()">Adicionar Matéria</button>

<div id="pastas"></div>
</div>

<div class="card">
<h2>📅 Calendário de Provas</h2>

<input id="provaNome" placeholder="Nome da prova">
<input type="date" id="provaData">

<button onclick="addProva()">Adicionar Prova</button>

<div id="listaProvas"></div>
</div>

<div class="card">
<h2>📚 Conteúdos Gerais</h2>

<textarea id="conteudoGeral"></textarea>
<button onclick="addConteudoGeral()">Adicionar</button>

<div id="listaConteudoGeral"></div>
</div>

<div class="card">
<h2>💖 Como estou me sentindo</h2>

<select id="humor">
<option>😊 Feliz</option>
<option>😐 Normal</option>
<option>😢 Triste</option>
<option>😡 Estressada</option>
<option>🥰 Motivada</option>
</select>

<button onclick="addHumor()">Salvar</button>

<div id="listaHumor"></div>
</div>

<div class="card">
<h2>ℹ Informações Escolares</h2>

<textarea id="infoTexto"></textarea>
<button onclick="salvarInfo()">Salvar</button>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("mochilaGirl")) || {
materias:[],
humor:[],
provas:[],
conteudos:[],
info:""
};

function salvar(){
localStorage.setItem("mochilaGirl",JSON.stringify(data));
}

function addMateria(){

let nome=materiaNome.value.trim();
let tarefa=tarefaInput.value.trim();

if(!nome)return;

data.materias.push({
nome,
tarefas:tarefa?[{txt:tarefa,done:false}]:[],
conteudos:[]
});

materiaNome.value="";
tarefaInput.value="";

salvar();
render();

}

function addTarefa(i){

let txt=prompt("Nova tarefa");
if(!txt)return;

data.materias[i].tarefas.push({txt,done:false});

salvar();
render();

}

function toggle(i,ti){

let t=data.materias[i].tarefas[ti];
t.done=!t.done;

salvar();
render();

}

function remover(i){
data.materias.splice(i,1);
salvar();
render();
}

function removerTarefa(i,ti){
data.materias[i].tarefas.splice(ti,1);
salvar();
render();
}

function addConteudo(i){

let txt=prompt("Conteúdo");
if(!txt)return;

data.materias[i].conteudos.push(txt);

salvar();
render();

}

function removerConteudo(i,ci){
data.materias[i].conteudos.splice(ci,1);
salvar();
render();
}

function addProva(){

let nome=provaNome.value;
let dataP=provaData.value;

if(!nome||!dataP)return;

data.provas.push({nome,data:dataP});

salvar();
render();

}

function addConteudoGeral(){

let txt=conteudoGeral.value;
if(!txt)return;

data.conteudos.push(txt);

conteudoGeral.value="";
salvar();
render();

}

function removerConteudoGeral(i){
data.conteudos.splice(i,1);
salvar();
render();
}

function addHumor(){

let h=humor.value;
let d=new Date().toLocaleDateString();

data.humor.push(`${d} - ${h}`);

salvar();
render();

}

function salvarInfo(){
data.info=infoTexto.value;
salvar();
}

function render(){

let busca=pesquisa.value.toLowerCase();

pastas.innerHTML="";

data.materias.forEach((m,i)=>{

if(!m.nome.toLowerCase().includes(busca))return;

let tarefas=m.tarefas.map((t,ti)=>`
<div class="item ${t.done?'done':''}">
${t.txt}
<div>
<button onclick="toggle(${i},${ti})">✔</button>
<button class="delete-btn" onclick="removerTarefa(${i},${ti})">X</button>
</div>
</div>`).join("");

let conteudos=m.conteudos.map((c,ci)=>`
<div class="item">
${c}
<button class="delete-btn" onclick="removerConteudo(${i},${ci})">X</button>
</div>`).join("");

pastas.innerHTML+=`
<div class="subject">

<strong>${m.nome}</strong>

<button onclick="addTarefa(${i})">+ tarefa</button>
<button onclick="addConteudo(${i})">+ conteúdo</button>
<button class="delete-btn" onclick="remover(${i})">Excluir</button>

${tarefas}

${conteudos}

</div>
`;

});

listaProvas.innerHTML=data.provas.map((p,i)=>`
<div class="item">
${p.nome} - ${p.data}
<button class="delete-btn" onclick="data.provas.splice(${i},1);salvar();render()">X</button>
</div>
`).join("");

listaConteudoGeral.innerHTML=data.conteudos.map((c,i)=>`
<div class="item">
${c}
<button class="delete-btn" onclick="removerConteudoGeral(${i})">X</button>
</div>
`).join("");

listaHumor.innerHTML=data.humor.map(h=>`
<div class="item">${h}</div>
`).join("");

infoTexto.value=data.info;

}

materiaNome.addEventListener("keypress",e=>{
if(e.key==="Enter")addMateria();
});

render();

</script>

</body>
</html>
