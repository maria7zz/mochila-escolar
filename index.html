<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f5f6fa;
color:#1e293b;
}

/* HEADER */

.header{
background:white;
padding:20px;
display:flex;
align-items:center;
gap:20px;
border-bottom:1px solid #eee;
}

.profile-pic{
width:60px;
height:60px;
border-radius:50%;
background:#ddd;
}

.profile-info h1{
font-size:18px;
}

.profile-info span{
font-size:13px;
color:#64748b;
}

/* LAYOUT */

.container{
display:grid;
grid-template-columns:260px 1fr;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
background:white;
border-right:1px solid #eee;
padding:20px;
}

.sidebar h3{
margin-bottom:10px;
font-size:14px;
color:#64748b;
}

.sidebar button{
width:100%;
padding:10px;
border:none;
background:#f1f5f9;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
text-align:left;
}

/* MAIN */

.main{
padding:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.04);
margin-bottom:20px;
}

/* INPUTS */

input,select,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #e2e8f0;
margin-top:8px;
}

button.primary{
background:#6366f1;
color:white;
border:none;
padding:10px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

button.delete{
background:#ef4444;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

/* MATERIA */

.subject{
border:1px solid #eee;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.task{
display:flex;
justify-content:space-between;
align-items:center;
background:#f8fafc;
padding:8px;
border-radius:6px;
margin-top:6px;
}

.done{
text-decoration:line-through;
opacity:0.5;
}

</style>
</head>

<body>

<div class="header">
<div class="profile-pic"></div>

<div class="profile-info">
<h1 id="nomePerfil">Seu Nome</h1>
<span id="bioPerfil">Sua bio escolar</span>
</div>
</div>

<div class="container">

<div class="sidebar">

<h3>Categorias</h3>

<button onclick="filtro='Exatas';render()">Exatas</button>
<button onclick="filtro='Humanas';render()">Humanas</button>
<button onclick="filtro='Curso';render()">Curso</button>
<button onclick="filtro='Itinerario';render()">Itinerário</button>
<button onclick="filtro='';render()">Todas</button>

</div>

<div class="main">

<div class="card">

<h3>Nova matéria</h3>

<input id="materiaNome" placeholder="Nome da matéria">

<select id="categoria">
<option>Exatas</option>
<option>Humanas</option>
<option>Curso</option>
<option>Itinerario</option>
</select>

<textarea id="tarefaInput" placeholder="Tarefa"></textarea>

<input type="date" id="dataTarefa">

<button class="primary" onclick="addMateria()">Adicionar</button>

</div>

<div id="lista"></div>

</div>
</div>

<script>

let filtro="";

let data = JSON.parse(localStorage.getItem("mochila")) || {
materias:[]
};

function salvar(){
localStorage.setItem("mochila",JSON.stringify(data));
}

function addMateria(){

let nome=materiaNome.value;
let categoria=categoria.value;
let tarefa=tarefaInput.value;
let dataT=dataTarefa.value;

if(!nome)return;

data.materias.push({
nome,
categoria,
tarefas:tarefa?[{txt:tarefa,data:dataT,done:false}]:[]
});

materiaNome.value="";
tarefaInput.value="";

salvar();
render();
}

function addTarefa(i){

let txt=prompt("Tarefa");
let dataT=prompt("Data YYYY-MM-DD");

if(!txt)return;

data.materias[i].tarefas.push({
txt,
data:dataT,
done:false
});

salvar();
render();
}

function toggle(i,t){

data.materias[i].tarefas[t].done=
!data.materias[i].tarefas[t].done;

salvar();
render();
}

function removerMateria(i){
data.materias.splice(i,1);
salvar();
render();
}

function render(){

lista.innerHTML="";

data.materias.forEach((m,i)=>{

if(filtro && m.categoria!=filtro) return;

let tarefas=m.tarefas.map((t,ti)=>`
<div class="task ${t.done?'done':''}">
<div>
${t.txt}
<br>
<small>${t.data||''}</small>
</div>

<div>
<button onclick="toggle(${i},${ti})">✓</button>
<button class="delete" onclick="data.materias[${i}].tarefas.splice(${ti},1);salvar();render()">x</button>
</div>

</div>
`).join("");

lista.innerHTML+=`

<div class="card subject">

<h3>${m.nome}</h3>
<small>${m.categoria}</small>

${tarefas}

<button class="primary" onclick="addTarefa(${i})">
Adicionar tarefa
</button>

<button class="delete" onclick="removerMateria(${i})">
Excluir matéria
</button>

</div>

`;

});

}

render();

</script>

</body>
</html>
