<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<title>Mochila Digital PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  background:#f1f5f9;
}

/* CAPA */
.capa{
  height:220px;
  background:
    linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.6)),
    url('https://img.a.transfermarkt.technology/portrait/big/476761-1691506765.jpg') center/cover no-repeat;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}
.capa h1{
  background:rgba(0,0,0,0.6);
  color:#fff;
  padding:10px 20px;
  border-radius:12px;
  margin-bottom:15px;
}

/* TOPO */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.topbar h2{
  color:#1e293b;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#7c3aed;
  color:white;
  cursor:pointer;
  font-size:13px;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  padding:0 20px 20px;
}

.dash-card{
  background:white;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* CONTAINER */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  border-radius:16px;
  padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

h2{
  color:#7c3aed;
  margin-bottom:10px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

.subject{
  background:#f8fafc;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
}

.item{
  background:#eef2ff;
  margin-top:6px;
  padding:8px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.delete-btn{
  background:#ef4444;
  font-size:12px;
  padding:5px 8px;
}
</style>
</head>

<body>

<div class="capa">
  <h1>🎒 Mochila Digital PRO</h1>
</div>

<div class="topbar">
  <div>
    <h2 id="userNome">Olá 👋</h2>
    <p id="userInfo"></p>
  </div>
</div>

<div class="dashboard">
  <div class="dash-card" id="presencaDash">📊 0%</div>
  <div class="dash-card" id="tarefasDash">📚 0</div>
  <div class="dash-card" id="humorDash">💜 -</div>
</div>

<div class="container">

<div class="card">
<h2>👤 Info</h2>
<input id="nome" placeholder="Nome">
<input id="turma" placeholder="Turma">
<input id="escola" placeholder="Escola">
<button onclick="salvarInfo()">Salvar</button>
</div>

<div class="card">
<h2>📚 Matérias</h2>
<input id="materiaNome" placeholder="Matéria">
<select id="categoria">
<option>Exatas</option>
<option>Humanas</option>
<option>Curso</option>
</select>
<input id="inputGlobal" placeholder="Adicionar tarefa">
<button onclick="addMateria()">Adicionar Matéria</button>
<div id="pastas"></div>
</div>

</div>

<script>
let data={materias:{Exatas:[],Humanas:[],Curso:[]},presenca:[],humor:[],provas:[],info:{}};

function salvarLocal(){localStorage.setItem('mochila',JSON.stringify(data));}
function carregarLocal(){let d=localStorage.getItem('mochila'); if(d)data=JSON.parse(d);}
carregarLocal();

function salvarInfo(){
data.info={nome:nome.value,turma:turma.value,escola:escola.value};
salvarLocal();render();
}

function addMateria(){
if(!materiaNome.value)return;
data.materias[categoria.value].push({nome:materiaNome.value,tarefas:[]});
materiaNome.value='';
salvarLocal();render();
}

function addItem(cat,i){
let txt=inputGlobal.value;
if(!txt)return;
data.materias[cat][i].tarefas.push(txt);
inputGlobal.value='';
salvarLocal();render();
}

function removerMateria(cat,i){
data.materias[cat].splice(i,1);
salvarLocal();render();
}

function removerTarefa(cat,i,ti){
data.materias[cat][i].tarefas.splice(ti,1);
salvarLocal();render();
}

function atualizarDashboard(){
let tarefas=0;
for(let c in data.materias){
data.materias[c].forEach(m=>tarefas+=m.tarefas.length);
}
tarefasDash.innerText="📚 "+tarefas;
}

function render(){
userInfo.innerText=data.info.nome?`${data.info.nome} - ${data.info.turma}`:'';

pastas.innerHTML='';
for(let cat in data.materias){
data.materias[cat].forEach((m,i)=>{
let tarefas=m.tarefas.map((t,ti)=>`
<div class='item'>
${t}
<button class="delete-btn" onclick="removerTarefa('${cat}',${i},${ti})">❌</button>
</div>`).join('');

pastas.innerHTML+=`
<div class='subject'>
<b>${m.nome}</b>
<div style="margin-top:8px;">
<button onclick="addItem('${cat}',${i})">+ Tarefa</button>
<button class="delete-btn" onclick="removerMateria('${cat}',${i})">Excluir</button>
</div>
${tarefas}
</div>`;
});
}

atualizarDashboard();
}

render();
</script>

</body>
</html>
