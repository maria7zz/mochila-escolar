<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mochila Escolar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{background:#f7f5ff;color:#1e293b}

.header{
background:linear-gradient(135deg,#ede9fe,#f5f3ff);
padding:20px;
display:flex;
gap:15px;
align-items:center;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:url("https://i.pinimg.com/736x/4d/6f/7a/4d6f7aef8d9b5d3c13a0e6a2df497bb7.jpg");
background-size:cover;
}

.container{
display:grid;
grid-template-columns:1fr 350px;
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 4px 10px rgba(0,0,0,.05);
margin-bottom:20px;
}

button{
background:#a78bfa;
border:none;
color:white;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

input,textarea,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #e5e7eb;
margin-top:8px;
}

/* materia */

.cor{
width:14px;
height:14px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.tarefa{
background:#f5f3ff;
padding:8px;
border-radius:8px;
margin-top:6px;
display:flex;
justify-content:space-between;
}

/* horario */

.grade{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

.quadro{
background:#f5f3ff;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

/* calendario */

.calendario{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
margin-top:10px;
}

.dia{
background:#f5f3ff;
padding:8px;
border-radius:8px;
text-align:center;
cursor:pointer;
font-size:12px;
min-height:70px;
}

.presenca{background:#bbf7d0}
.falta{background:#fecaca}
.prova{background:#ddd6fe}

.topcal{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:5px;
}

.legend{
display:flex;
gap:10px;
font-size:12px;
margin-top:5px;
}

</style>
</head>

<body>

<div class="header">
<div class="avatar"></div>
<div style="width:100%">
<input id="nome" placeholder="Seu nome">
<textarea id="bio" placeholder="Sua bio"></textarea>
</div>
</div>

<div class="container">

<div>

<div class="card">
<h3>Adicionar matéria</h3>
<input id="novaMateria">
<button onclick="addMateria()">Adicionar</button>
</div>

<div id="listaMaterias"></div>

<div class="card">
<h3>Meu horário</h3>
<div id="gradeHorario" class="grade"></div>
</div>

</div>

<div>

<div class="card">

<div class="topcal">
<button onclick="mesAnterior()">◀</button>
<h3 id="mesLabel"></h3>
<button onclick="mesProximo()">▶</button>
</div>

<div class="legend">
<div><span class="cor" style="background:#bbf7d0"></span>Presença</div>
<div><span class="cor" style="background:#fecaca"></span>Falta</div>
<div><span class="cor" style="background:#ddd6fe"></span>Prova</div>
</div>

<div id="calendario" class="calendario"></div>

<div id="estatisticas"></div>

</div>

</div>

</div>

<script>

let hoje = new Date()

let data = JSON.parse(localStorage.getItem("mochila")) || {
perfil:{nome:"",bio:""},
materias:[],
horario:Array(9).fill(""),
calendario:{}
}

const cores=[
"#a78bfa","#60a5fa","#34d399",
"#f472b6","#fbbf24","#fb7185"
]

function salvar(){
localStorage.setItem("mochila",JSON.stringify(data))
}

/* perfil */

nome.oninput=e=>{
data.perfil.nome=e.target.value
salvar()
}

bio.oninput=e=>{
data.perfil.bio=e.target.value
salvar()
}

/* materias */

function addMateria(){

let nome=novaMateria.value.trim()
if(!nome) return

data.materias.push({
nome,
cor:cores[Math.floor(Math.random()*cores.length)],
tarefas:[]
})

salvar()
render()

}

function addTarefa(i){

let nome=prompt("Tarefa")
let dataT=prompt("YYYY-MM-DD")

data.materias[i].tarefas.push({
nome,
data:dataT
})

data.materias[i].tarefas.sort(
(a,b)=>new Date(a.data)-new Date(b.data)
)

salvar()
render()

}

/* horario */

function editarHorario(i){

let t=prompt("Aula")
if(t===null)return

data.horario[i]=t
salvar()
render()

}

/* calendario */

function gerarCalendario(){

let ano=hoje.getFullYear()
let mes=hoje.getMonth()

mesLabel.innerText=
hoje.toLocaleString("pt-BR",{month:"long",year:"numeric"})

let dias=new Date(ano,mes+1,0).getDate()

calendario.innerHTML=""

let pres=0
let falt=0

for(let d=1;d<=dias;d++){

let key=`${ano}-${mes}-${d}`
let tipo=data.calendario[key]||""

if(tipo=="presenca") pres++
if(tipo=="falta") falt++

let tarefas=""

data.materias.forEach(m=>{
m.tarefas.forEach(t=>{
let td=new Date(t.data)
if(td.getDate()==d && td.getMonth()==mes)
tarefas+="•"+t.nome+"<br>"
})
})

calendario.innerHTML+=`
<div class="dia ${tipo}"
onclick="marcarDia('${key}')">

<b>${d}</b>
<br>
${tarefas}

</div>
`

}

let total=pres+falt
let media= total? Math.round((pres/total)*100):0

estatisticas.innerHTML=`
<br>
Presenças: ${pres} <br>
Faltas: ${falt} <br>
Presença: ${media}% 
`

}

function marcarDia(key){

let r=prompt(
1 Presença
2 Falta
3 Prova
0 Limpar
)

if(r==1) data.calendario[key]="presenca"
else if(r==2) data.calendario[key]="falta"
else if(r==3) data.calendario[key]="prova"
else delete data.calendario[key]

salvar()
render()

}

function mesAnterior(){
hoje.setMonth(hoje.getMonth()-1)
render()
}

function mesProximo(){
hoje.setMonth(hoje.getMonth()+1)
render()
}

/* render */

function render(){

nome.value=data.perfil.nome
bio.value=data.perfil.bio

listaMaterias.innerHTML=""

data.materias.forEach((m,i)=>{

let tarefas=m.tarefas.map(t=>`
<div class="tarefa">
${t.nome}
<small>${t.data}</small>
</div>
`).join("")

listaMaterias.innerHTML+=`
<div class="card">
<h3>
<span class="cor" style="background:${m.cor}"></span>
${m.nome}
</h3>

<button onclick="addTarefa(${i})">
Nova tarefa
</button>

${tarefas}

</div>
`

})

gradeHorario.innerHTML=""

data.horario.forEach((h,i)=>{
gradeHorario.innerHTML+=`
<div class="quadro" onclick="editarHorario(${i})">
${h||"Adicionar"}
</div>
`
})

gerarCalendario()

}

render()

</script>
  
 <a href="d-h.html"><button class="bnt"> Direitos Humanos </button></a>
</body>
</html>
