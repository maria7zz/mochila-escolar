<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --roxo:#e9e5ff;
  --roxo2:#c4b5fd;
  --amarelo:#fff9db;
  --bg:#f8f7ff;
  --card:#ffffff;
}

*{font-family:'Outfit',sans-serif;box-sizing:border-box;margin:0}

body{display:flex;background:var(--bg)}

.sidebar{
  width:240px;
  background:var(--roxo2);
  height:100vh;
  padding:20px;
  color:white;
}

.sidebar h1{font-size:18px;margin-bottom:15px}

.sidebar button{
  width:100%;padding:10px;margin:5px 0;
  border:none;border-radius:10px;
  background:rgba(255,255,255,0.2);
  color:white;cursor:pointer;
}

.main{flex:1;padding:20px}

.header h1{font-size:26px;color:#7c6cff}
.header p{opacity:.6;margin-bottom:15px}

.card{
  background:var(--card);
  padding:15px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* matérias */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.subject{
  background:var(--roxo);
  border-radius:15px;
  padding:10px;
  min-height:220px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.subject input{
  border:none;background:transparent;font-weight:bold
}

.tasks,.diary{margin-top:5px}

input,textarea{
  width:100%;padding:6px;margin-top:5px;
  border-radius:8px;border:1px solid #ddd;
}

textarea{height:60px}

button{
  margin-top:5px;padding:6px;
  border:none;border-radius:8px;
  background:#a78bfa;color:white;cursor:pointer;
}

.delete{background:#ff6b6b}

/* calendário */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.day{
  background:var(--amarelo);
  padding:10px;border-radius:8px;
  text-align:center;cursor:pointer;
}

.day.active{background:#a78bfa;color:white}

/* horario */
.schedule{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:5px;
}

.cell{
  background:#eee;padding:10px;
  border-radius:8px;text-align:center;
}

</style>
</head>
<body>

<div class="sidebar">
  <h1>Mochila Digital</h1>
  <button onclick="show('materias')">Matérias</button>
  <button onclick="show('calendario')">Provas</button>
  <button onclick="show('horario')">Horário</button>
  <button onclick="show('dados')">Dados</button>
  <button onclick="show('anotacoes')">Anotações</button>
</div>

<div class="main">

<div class="header">
  <h1>Mochila Digital da Maria</h1>
  <p>Organize seus estudos como um profissional ✨</p>
</div>

<!-- MATÉRIAS -->
<div id="materias">
  <div class="card">
    <h2>Exatas</h2>
    <button onclick="add('exatas')">+ Matéria</button>
    <div class="grid" id="exatas"></div>
  </div>

  <div class="card">
    <h2>Humanas</h2>
    <button onclick="add('humanas')">+ Matéria</button>
    <div class="grid" id="humanas"></div>
  </div>

  <div class="card">
    <h2>Itinerário</h2>
    <button onclick="add('itinerario')">+ Matéria</button>
    <div class="grid" id="itinerario"></div>
  </div>

  <div class="card">
    <h2>Curso</h2>
    <button onclick="add('curso')">+ Matéria</button>
    <div class="grid" id="curso"></div>
  </div>
</div>

<!-- CALENDARIO -->
<div id="calendario" style="display:none">
  <div class="card">
    <h2>Calendário de Provas</h2>
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<!-- HORARIO -->
<div id="horario" style="display:none">
  <div class="card">
    <h2>Horário de Aula</h2>
    <div class="schedule" id="schedule"></div>
  </div>
</div>

<!-- DADOS -->
<div id="dados" style="display:none">
  <div class="card">
    <h2>Dados Pessoais</h2>
    <input placeholder="Nome">
    <input placeholder="Escola">
    <input placeholder="Turma">
  </div>
</div>

<!-- ANOTAÇÕES -->
<div id="anotacoes" style="display:none">
  <div class="card">
    <h2>Anotações do Dia</h2>
    <textarea placeholder="Escreva aqui..."></textarea>
  </div>
</div>

</div>

<script>
function show(id){
  ['materias','calendario','horario','dados','anotacoes'].forEach(s=>{
    document.getElementById(s).style.display='none';
  });
  document.getElementById(id).style.display='block';
}

function add(cat){
  let div=document.createElement('div');
  div.className='subject';
  div.innerHTML=`
    <input placeholder='Matéria'>
    <div class='tasks'>
      <button onclick='addTask(this)'>+ tarefa</button>
    </div>
    <div class='diary'>
      <button onclick='addDiary(this)'>+ diário</button>
    </div>
    <button class='delete' onclick='this.parentElement.remove()'>Excluir</button>
  `;
  document.getElementById(cat).appendChild(div);
}

function addTask(btn){
  let input=document.createElement('input');
  input.placeholder='Digite a tarefa';
  btn.parentElement.appendChild(input);
}

function addDiary(btn){
  let t=document.createElement('textarea');
  t.placeholder='O que aconteceu na aula';
  btn.parentElement.appendChild(t);
}

// calendário
for(let i=1;i<=31;i++){
  let d=document.createElement('div');
  d.className='day';
  d.innerText=i;
  d.onclick=()=>d.classList.toggle('active');
  document.getElementById('calendar').appendChild(d);
}

// horario
for(let i=0;i<25;i++){
  let c=document.createElement('div');
  c.className='cell';
  c.contentEditable=true;
  document.getElementById('schedule').appendChild(c);
}
</script>

</body>
</html>
