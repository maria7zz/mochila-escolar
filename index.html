<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<title>Mochila Digital</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#f5f3ff;
color:#1e293b;
}

/* PERFIL */

.header{
background:white;
padding:20px;
display:flex;
gap:15px;
align-items:center;
border-bottom:1px solid #eee;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
background:#ddd;
}

.profile input{
border:none;
font-size:18px;
font-weight:600;
background:transparent;
width:100%;
}

.profile textarea{
border:none;
resize:none;
background:transparent;
font-size:13px;
color:#64748b;
width:100%;
}

/* LAYOUT */

.container{
display:grid;
grid-template-columns:240px 1fr;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
background:white;
border-right:1px solid #eee;
padding:20px;
}

.folder{
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:5px;
}

.folder:hover{
background:#ede9fe;
}

.active{
background:#ddd6fe;
}

/* MAIN */

.main{
padding:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.04);
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #e2e8f0;
margin-top:8px;
}

button{
background:#8b5cf6;
border:none;
color:white;
padding:10px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.delete{
background:#ef4444;
padding:5px 10px;
}

.subject{
border:1px solid #eee;
padding:15px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.task{
display:flex;
justify-content:space-between;
background:#f5f3ff;
padding:8px;
border-radius:8px;
margin-top:6px;
}

.done{
text-decoration:line-through;
opacity:0.5;
}

</style>
</head>

<body>

<div class="header">
<div class="avatar"></div>

<div class="profile">
<input id="nomePerfil" placeholder="Seu nome">
<textarea id="bioPerfil" placeholder="Bio escolar"></textarea>
</div>
</div>

<div class="container">

<div class="sidebar">

<div class="folder" onclick="abrirPasta('Exatas')">Exatas</div>
<div class="folder" onclick="abrirPasta('Humanas')">Humanas</div>
<div class="folder" onclick="abrirPasta('Curso')">Curso</div>
<div class="folder" onclick="abrirPasta('Itinerario')">Itinerário</div>

</div>

<div class="main">

<div class="card">
<h3>Adicionar matéria</h3>
<input id="materiaNome" placeholder="Nome da matéria">
<button onclick="addMateria()">Adicionar</button>
</div>

<div id="conteudo"></div>

</div>
</div>

<script>

let pastaAtual="Exatas"
let materiaAtual=null

let data = JSON.parse(localStorage.getItem("mochila")) || {
perfil:{nome:"",bio:""},
pastas:{
Exatas:[],
Humanas:[],
Curso:[],
Itinerario:[]
}
}

function salvar(){
localStorage.setItem("mochila",JSON.stringify(data))
}

function abrirPasta(nome){
pastaAtual=nome
materiaAtual=null
render()
}

function addMateria(){

let nome=document.getElementById("materiaNome").value.trim()

if(!nome) return

data.pastas[pastaAtual].push({
nome:nome,
tarefas:[]
})

document.getElementById("materiaNome").value=""

salvar()
render()
}

function abrirMateria(i){
materiaAtual=i
render()
}

function addTarefa(){

let nome=prompt("Nome da tarefa")
let dataT=prompt("Data (YYYY-MM-DD)")

if(!nome) return

data.pastas[pastaAtual][materiaAtual].tarefas.push({
nome,
data:dataT,
done:false
})

salvar()
render()
}

function toggle(i){
let t=data.pastas[pastaAtual][materiaAtual].tarefas[i]
t.done=!t.done
salvar()
render()
}

function removerTarefa(i){
data.pastas[pastaAtual][materiaAtual].tarefas.splice(i,1)
salvar()
render()
}

function removerMateria(i){
data.pastas[pastaAtual].splice(i,1)
materiaAtual=null
salvar()
render()
}

function render(){

nomePerfil.value=data.perfil.nome
bioPerfil.value=data.perfil.bio

let area=document.getElementById("conteudo")

if(materiaAtual===null){

area.innerHTML=""

data.pastas[pastaAtual].forEach((m,i)=>{

area.innerHTML+=`
<div class="subject">

<strong onclick="abrirMateria(${i})">${m.nome}</strong>

<br>

<button class="delete" onclick="removerMateria(${i})">
Excluir
</button>

</div>
`

})

}else{

let m=data.pastas[pastaAtual][materiaAtual]

let tarefas=m.tarefas.map((t,i)=>`
<div class="task ${t.done?'done':''}">

<div>
${t.nome}
<br>
<small>${t.data||""}</small>
</div>

<div>
<button onclick="toggle(${i})">✓</button>
<button class="delete" onclick="removerTarefa(${i})">x</button>
</div>

</div>
`).join("")

area.innerHTML=`

<div class="card">

<h2>${m.nome}</h2>

<button onclick="addTarefa()">Nova tarefa</button>

${tarefas}

<button onclick="materiaAtual=null;render()">
Voltar
</button>

</div>

`

}

}

nomePerfil.addEventListener("input",()=>{
data.perfil.nome=nomePerfil.value
salvar()
})

bioPerfil.addEventListener("input",()=>{
data.perfil.bio=bioPerfil.value
salvar()
})

render()

</script>

</body>
</html>
