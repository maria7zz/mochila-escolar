<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila PRO 3.5</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#fce4ec,#f8bbd0);
display:flex;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
background:#880e4f;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
width:250px;
}

.login-box input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin:10px 0;
}

/* MENU */
.sidebar{
width:200px;
background:#880e4f;
color:white;
padding:20px;
}

.sidebar button{
width:100%;
margin:5px 0;
padding:10px;
border:none;
background:#ffffff22;
color:white;
border-radius:10px;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* PASTAS */
.pasta{
background:white;
padding:20px;
border-radius:12px;
margin:10px 0;
cursor:pointer;
font-weight:bold;
}

/* MATERIA */
.materia{
background:white;
padding:15px;
border-radius:12px;
margin:10px;
width:220px;
display:inline-block;
vertical-align:top;
}

/* INPUT */
input, textarea{
width:100%;
margin:5px 0;
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#e91e63;
color:white;
border:none;
padding:8px;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h3>🔐 Entrar</h3>
<input id="senha" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
</div>
</div>

<div class="sidebar">
<h2>📚 Mochila</h2>
<button onclick="mostrarPastas()">Matérias</button>
</div>

<div class="main" id="main">

</div>

<script>

/* LOGIN */
function entrar(){
let s = localStorage.getItem("senha");
if(!s){
localStorage.setItem("senha", senha.value);
}
if(senha.value === localStorage.getItem("senha")){
login.style.display="none";
}
}

/* DADOS */
let dados = JSON.parse(localStorage.getItem("dados")) || {
materias:[]
};

function salvar(){
localStorage.setItem("dados", JSON.stringify(dados));
}

/* MOSTRAR PASTAS */
function mostrarPastas(){
main.innerHTML=`
<div class="pasta" onclick="abrirPasta('Exatas')">📘 Exatas</div>
<div class="pasta" onclick="abrirPasta('Humanas')">📗 Humanas</div>
<div class="pasta" onclick="abrirPasta('Itinerários')">📙 Itinerários</div>
<div class="pasta" onclick="abrirPasta('Curso Técnico')">📕 Curso Técnico</div>
`;
}

/* ABRIR PASTA */
function abrirPasta(tipo){
main.innerHTML=`
<h2>${tipo}</h2>

<input id="novaMateria" placeholder="Nova matéria">
<button onclick="addMateria('${tipo}')">Adicionar</button>

<div id="lista"></div>
<button onclick="mostrarPastas()">⬅ Voltar</button>
`;

renderMaterias(tipo);
}

/* ADD MATERIA */
function addMateria(tipo){
let nome = document.getElementById("novaMateria").value;
if(!nome) return;

dados.materias.push({
nome,
tipo,
tarefas:[],
diario:""
});

salvar();
abrirPasta(tipo);
}

/* RENDER */
function renderMaterias(tipo){
let lista=document.getElementById("lista");
lista.innerHTML="";

dados.materias.forEach((m,i)=>{
if(m.tipo!==tipo) return;

let div=document.createElement("div");
div.className="materia";

div.innerHTML=`
<b>${m.nome}</b>
<textarea placeholder="Diário" onchange="salvarDiario(${i},this.value)">${m.diario}</textarea>

<input placeholder="Nova tarefa" id="tarefa${i}">
<button onclick="addTarefa(${i})">Adicionar</button>

<div>${m.tarefas.map((t,ti)=>`
<div>
${t}
<button onclick="removerTarefa(${i},${ti})">❌</button>
</div>
`).join("")}</div>

<button onclick="removerMateria(${i})">Excluir matéria</button>
`;

lista.appendChild(div);
});
}

/* TAREFAS */
function addTarefa(i){
let val=document.getElementById("tarefa"+i).value;
if(!val) return;

dados.materias[i].tarefas.push(val);
salvar();
abrirPasta(dados.materias[i].tipo);
}

function removerTarefa(i,ti){
dados.materias[i].tarefas.splice(ti,1);
salvar();
abrirPasta(dados.materias[i].tipo);
}

/* DIARIO */
function salvarDiario(i,val){
dados.materias[i].diario=val;
salvar();
}

/* REMOVER */
function removerMateria(i){
dados.materias.splice(i,1);
salvar();
mostrarPastas();
}

/* INIT */
mostrarPastas();

</script>

</body>
</html>
