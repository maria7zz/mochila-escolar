<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Ultra 7.0</title>

<style>

:root{
--bg:#fce4ec;
--card:#ffffff;
--primary:#e91e63;
--text:#333;
}

.dark{
--bg:#121212;
--card:#1e1e1e;
--text:#eee;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
display:flex;
transition:0.3s;
}

/* SIDEBAR */
.sidebar{
width:230px;
background:var(--primary);
color:white;
padding:15px;
height:100vh;
box-shadow:2px 0 10px rgba(0,0,0,0.2);
}

.sidebar h2{margin-bottom:20px}

.sidebar button{
width:100%;
margin:5px 0;
padding:10px;
border:none;
background:#ffffff22;
color:white;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.sidebar button:hover{
background:#ffffff44;
}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow:auto;
}

/* CARD */
.card{
background:var(--card);
padding:15px;
border-radius:16px;
margin:10px 0;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
animation:fade 0.3s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

/* INPUT */
input,textarea,select{
width:100%;
margin:5px 0;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:var(--primary);
color:white;
border:none;
padding:8px;
border-radius:10px;
margin-top:5px;
cursor:pointer;
}

/* GRID HORARIO */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

/* CALENDARIO */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}
.day{
padding:10px;
border-radius:10px;
background:var(--card);
cursor:pointer;
text-align:center;
}
.prova{background:#ffcc80}
.presente{background:#c8e6c9}
.falta{background:#ffcdd2}

/* DASHBOARD */
.stats{
display:flex;
gap:10px;
flex-wrap:wrap;
}
.stat{
flex:1;
background:var(--card);
padding:15px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>📚 Mochila</h2>
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('materias')">Matérias</button>
<button onclick="mostrar('calendario')">Calendário</button>
<button onclick="mostrar('horario')">Horário</button>
<button onclick="mostrar('notas')">Desempenho</button>
<button onclick="toggleDark()">🌙 Modo</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="stats">
<div class="stat" id="totalTarefas">0 Tarefas</div>
<div class="stat" id="totalMaterias">0 Matérias</div>
<div class="stat" id="mediaNotas">0 Média</div>
</div>

<div class="card">
<h3>Tarefas</h3>
<input id="tarefa"><button onclick="addTarefa()">Adicionar</button>
<div id="tarefas"></div>
</div>

</div>

<!-- MATERIAS -->
<div id="materias" style="display:none">
<div class="card">
<input id="matNome" placeholder="Nome">
<select id="matTipo">
<option>Exatas</option>
<option>Humanas</option>
<option>Itinerário</option>
<option>Técnico</option>
</select>
<button onclick="addMateria()">Adicionar</button>
</div>

<div id="listaMaterias"></div>
</div>

<!-- CALENDARIO -->
<div id="calendario" style="display:none">
<div class="card">
<h3 id="mes"></h3>
<button onclick="voltarMes()">◀</button>
<button onclick="proximoMes()">▶</button>
<div class="calendar" id="dias"></div>
<button onclick="setTipo('prova')">Prova</button>
<button onclick="setTipo('presente')">Presente</button>
<button onclick="setTipo('falta')">Falta</button>
</div>
</div>

<!-- HORARIO -->
<div id="horario" style="display:none">
<div class="card">
<h3>Horário</h3>
<div class="grid" id="grade"></div>
<button onclick="salvarHorario()">Salvar</button>
</div>
</div>

<!-- NOTAS -->
<div id="notas" style="display:none">
<div class="card">
<input id="nota"><button onclick="addNota()">Adicionar</button>
<div id="grafico"></div>
</div>
</div>

</div>

<script>

let db = JSON.parse(localStorage.getItem("db")) || {
tarefas:[], materias:[], notas:[], dias:{}, horario:{}
};

function salvar(){
localStorage.setItem("db",JSON.stringify(db))
}

/* MENU */
function mostrar(id){
document.querySelectorAll(".main > div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="block";
}

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
localStorage.setItem("dark",document.body.classList.contains("dark"));
}
if(localStorage.getItem("dark")=="true") document.body.classList.add("dark");

/* DASHBOARD */
function atualizarDashboard(){
totalTarefas.innerText = db.tarefas.length + " Tarefas";
totalMaterias.innerText = db.materias.length + " Matérias";

let media = db.notas.length
? (db.notas.reduce((a,b)=>a+b,0)/db.notas.length).toFixed(1)
: 0;

mediaNotas.innerText = media + " Média";
}

/* TAREFAS */
function addTarefa(){
if(!tarefa.value) return;
db.tarefas.push(tarefa.value);
tarefa.value="";
salvar(); renderTarefas();
}
function renderTarefas(){
tarefas.innerHTML="";
db.tarefas.forEach((t,i)=>{
tarefas.innerHTML+=`${t} <button onclick="delT(${i})">X</button><br>`;
});
atualizarDashboard();
}
function delT(i){
db.tarefas.splice(i,1);
salvar(); renderTarefas();
}

/* MATERIAS */
function addMateria(){
db.materias.push({nome:matNome.value,tipo:matTipo.value});
matNome.value="";
salvar(); renderMaterias();
}
function renderMaterias(){
listaMaterias.innerHTML="";
db.materias.forEach((m,i)=>{
listaMaterias.innerHTML+=`
<div class="card">
${m.nome} (${m.tipo})
<button onclick="delM(${i})">X</button>
</div>`;
});
atualizarDashboard();
}
function delM(i){
db.materias.splice(i,1);
salvar(); renderMaterias();
}

/* CALENDARIO */
let mesAtual = new Date().getMonth();
let ano = new Date().getFullYear();
let tipo="";

function renderCal(){
dias.innerHTML="";
mes.innerText=new Date(ano,mesAtual).toLocaleString('pt-BR',{month:'long',year:'numeric'});

let total=new Date(ano,mesAtual+1,0).getDate();

for(let i=1;i<=total;i++){
let c=db.dias[`${i}-${mesAtual}-${ano}`]||"";
dias.innerHTML+=`<div class="day ${c}" onclick="marcar(${i})">${i}</div>`;
}
}

function marcar(d){
db.dias[`${d}-${mesAtual}-${ano}`]=tipo;
salvar(); renderCal();
}
function setTipo(t){tipo=t}

function proximoMes(){mesAtual++;if(mesAtual>11){mesAtual=0;ano++}renderCal()}
function voltarMes(){mesAtual--;if(mesAtual<0){mesAtual=11;ano--}renderCal()}

/* HORARIO */
let diasSemana=["Seg","Ter","Qua","Qui","Sex"];

function renderHorario(){
grade.innerHTML="";
diasSemana.forEach((d,i)=>{
grade.innerHTML+=`
<div class="card">
<b>${d}</b>
<input id="h_${i}_1">
<input id="h_${i}_2">
<input id="h_${i}_3">
</div>`;
});

Object.entries(db.horario).forEach(([k,v])=>{
if(document.getElementById(k))
document.getElementById(k).value=v;
});
}

function salvarHorario(){
let h={};
diasSemana.forEach((d,i)=>{
for(let j=1;j<=3;j++){
h[`h_${i}_${j}`]=document.getElementById(`h_${i}_${j}`).value;
}
});
db.horario=h;
salvar();
}

/* NOTAS */
function addNota(){
db.notas.push(Number(nota.value));
nota.value="";
salvar(); renderNotas();
}

function renderNotas(){
grafico.innerHTML="";
db.notas.forEach(n=>{
grafico.innerHTML+=`
<div class="card">
Nota ${n}
<div style="background:#eee;border-radius:10px">
<div style="width:${n*10}%;height:10px;background:var(--primary);border-radius:10px"></div>
</div>
</div>`;
});
atualizarDashboard();
}

/* INIT */
renderTarefas();
renderMaterias();
renderNotas();
renderCal();
renderHorario();
atualizarDashboard();

</script>

</body>
</html>
