<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<title>Mochila Digital</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#faf9ff;
color:#1e293b;
transition:.3s;
}

.dark{
background:#0f172a;
color:white;
}

.header{
background:white;
padding:20px;
display:flex;
gap:15px;
align-items:center;
border-bottom:1px solid #eee;
}

.dark .header{
background:#020617;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
background-image:url("https://i.pinimg.com/736x/4d/6f/7a/4d6f7aef8d9b5d3c13a0e6a2df497bb7.jpg");
background-size:cover;
background-position:center;
}

.profile input{
border:none;
font-size:18px;
font-weight:600;
background:transparent;
width:100%;
color:inherit;
}

.profile textarea{
border:none;
resize:none;
background:transparent;
font-size:13px;
color:#64748b;
width:100%;
}

.container{
display:grid;
grid-template-columns:240px 1fr;
min-height:100vh;
}

.sidebar{
background:white;
border-right:1px solid #eee;
padding:20px;
}

.dark .sidebar{
background:#020617;
}

.folder{
padding:10px;
border-radius:8px;
cursor:pointer;
margin-bottom:5px;
}

.folder:hover{
background:#f3f0ff;
}

.main{
padding:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
margin-bottom:20px;
}

.dark .card{
background:#020617;
}

input,select,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #e5e7eb;
margin-top:8px;
}

button{
background:#8b5cf6;
border:none;
color:white;
padding:10px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.delete{
background:#ef4444;
padding:5px 10px;
}

.subject{
border:1px solid #eee;
padding:15px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.task{
display:flex;
justify-content:space-between;
background:#f5f3ff;
padding:8px;
border-radius:8px;
margin-top:6px;
}

.stats{
display:flex;
gap:20px;
margin-top:8px;
font-size:13px;
color:#64748b;
}

</style>
</head>

<body>

<div class="header">

<div class="avatar"></div>

<div class="profile">
<input id="nomePerfil" placeholder="Seu nome">
<textarea id="bioPerfil" placeholder="Bio escolar"></textarea>

<div class="stats">
<div id="totalMaterias">0 matérias</div>
<div id="totalTarefas">0 tarefas</div>
</div>

<button onclick="toggleDark()">Modo escuro</button>

</div>
</div>

<div class="container">

<div class="sidebar">
<div class="folder" onclick="abrirPasta('Exatas')">Exatas</div>
<div class="folder" onclick="abrirPasta('Humanas')">Humanas</div>
<div class="folder" onclick="abrirPasta('Curso')">Curso</div>
<div class="folder" onclick="abrirPasta('Itinerario')">Itinerário</div>
</div>

<div class="main">

<div class="card">

<h3>Adicionar matéria</h3>

<input id="materiaNome" placeholder="Nome da matéria">

<select id="categoria">
<option value="Exatas">Exatas</option>
<option value="Humanas">Humanas</option>
<option value="Curso">Curso</option>
<option value="Itinerario">Itinerário</option>
</select>

<button onclick="addMateria()">Adicionar</button>

</div>

<div id="conteudo"></div>

</div>
</div>

<script>

let pastaAtual="Exatas"
let materiaAtual=null

let data = JSON.parse(localStorage.getItem("mochila")) || {
perfil:{nome:"",bio:""},
dark:false,
pastas:{
Exatas:[],
Humanas:[],
Curso:[],
Itinerario:[]
}
}

function salvar(){
localStorage.setItem("mochila",JSON.stringify(data))
}

function toggleDark(){
data.dark=!data.dark
salvar()
render()
}

function abrirPasta(nome){
pastaAtual=nome
materiaAtual=null
render()
}

function addMateria(){

let nome=materiaNome.value.trim()
let pasta=categoria.value

if(!nome) return

data.pastas[pasta].push({
nome,
tarefas:[]
})

materiaNome.value=""
salvar()
render()
}

function abrirMateria(i){
materiaAtual=i
render()
}

function addTarefa(){

let nome=prompt("Nome da tarefa")
if(!nome) return

let dataT=prompt("Data YYYY-MM-DD")

data.pastas[pastaAtual][materiaAtual].tarefas.push({
nome,
data:dataT,
done:false
})

salvar()
render()
}

function toggle(i){
let t=data.pastas[pastaAtual][materiaAtual].tarefas[i]
t.done=!t.done
salvar()
render()
}

function removerTarefa(i){
data.pastas[pastaAtual][materiaAtual].tarefas.splice(i,1)
salvar()
render()
}

function removerMateria(i){
data.pastas[pastaAtual].splice(i,1)
materiaAtual=null
salvar()
render()
}

function render(){

document.body.classList.toggle("dark",data.dark)

nomePerfil.value=data.perfil.nome
bioPerfil.value=data.perfil.bio

let totalM=0
let totalT=0

Object.values(data.pastas).forEach(p=>{
totalM+=p.length
p.forEach(m=> totalT+=m.tarefas.length )
})

totalMaterias.innerText=totalM+" matérias"
totalTarefas.innerText=totalT+" tarefas"

let area=document.getElementById("conteudo")

if(materiaAtual===null){

area.innerHTML=""

data.pastas[pastaAtual].forEach((m,i)=>{

area.innerHTML+=`
<div class="subject">

<strong onclick="abrirMateria(${i})">${m.nome}</strong>

<br>

<button class="delete" onclick="removerMateria(${i})">
Excluir
</button>

</div>
`

})

}else{

let m=data.pastas[pastaAtual][materiaAtual]

let tarefas=m.tarefas.map((t,i)=>`
<div class="task">

<div>
${t.nome}
<br>
<small>${t.data||""}</small>
</div>

<div>
<button onclick="toggle(${i})">✓</button>
<button class="delete" onclick="removerTarefa(${i})">x</button>
</div>

</div>
`).join("")

area.innerHTML=`

<div class="card">

<h2>${m.nome}</h2>

<button onclick="addTarefa()">Nova tarefa</button>

${tarefas}

<button onclick="materiaAtual=null;render()">
Voltar
</button>

</div>

`

}

}

nomePerfil.addEventListener("input",()=>{
data.perfil.nome=nomePerfil.value
salvar()
})

bioPerfil.addEventListener("input",()=>{
data.perfil.bio=bioPerfil.value
salvar()
})

render()

</script>

</body>
</html>
