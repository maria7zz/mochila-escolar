<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Ultra 4.0</title>

<style>
body{margin:0;font-family:Arial;background:#fce4ec;display:flex}

/* MENU */
.sidebar{
width:220px;background:#880e4f;color:white;padding:15px;height:100vh
}
.sidebar button{
width:100%;margin:5px 0;padding:10px;border:none;background:#ffffff22;color:white;border-radius:10px
}

/* MAIN */
.main{flex:1;padding:20px}

.card{
background:white;padding:15px;border-radius:12px;margin:10px 0
}

/* MATERIAS */
.materia{
background:white;padding:10px;border-radius:10px;margin:10px;display:inline-block;width:220px
}

/* CALENDARIO */
.calendar{
display:grid;grid-template-columns:repeat(7,1fr);gap:5px
}
.day{
padding:10px;background:white;border-radius:8px;text-align:center;cursor:pointer
}
.prova{background:#ffcc80}
.presente{background:#c8e6c9}
.falta{background:#ffcdd2}

/* GRAFICO */
.bar{height:10px;background:#e91e63;margin:5px 0}

/* INPUT */
input,textarea,select{
width:100%;margin:5px 0;padding:8px;border-radius:8px;border:1px solid #ccc
}

button{
background:#e91e63;color:white;border:none;padding:8px;border-radius:8px;margin-top:5px
}
</style>
</head>

<body>

<div class="sidebar">
<h2>📚 Mochila</h2>
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('materias')">Matérias</button>
<button onclick="mostrar('calendario')">Calendário</button>
<button onclick="mostrar('horario')">Horário</button>
<button onclick="mostrar('metas')">Metas</button>
<button onclick="mostrar('notas')">Desempenho</button>
<button onclick="mostrar('dados')">Dados</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<div class="card">
<h3>Tarefas</h3>
<input id="tarefa"><button onclick="addTarefa()">Adicionar</button>
<div id="tarefas"></div>
</div>

<div class="card">
<h3>Anotações</h3>
<textarea id="anotacao" onchange="salvarAnotacao()"></textarea>
</div>
</div>

<!-- MATERIAS -->
<div id="materias" style="display:none">
<div class="card">
<input id="matNome">
<select id="matTipo">
<option>Exatas</option><option>Humanas</option><option>Itinerários</option><option>Técnico</option>
</select>
<button onclick="addMateria()">Adicionar</button>
</div>
<div id="listaMaterias"></div>
</div>

<!-- CALENDARIO -->
<div id="calendario" style="display:none">
<div class="card">
<h3 id="mes"></h3>
<div class="calendar" id="dias"></div>
<button onclick="setTipo('prova')">Prova</button>
<button onclick="setTipo('presente')">Presente</button>
<button onclick="setTipo('falta')">Falta</button>
</div>
</div>

<!-- HORARIO -->
<div id="horario" style="display:none">
<div class="card">
<textarea id="horarios" placeholder="Ex: Segunda - Matemática"></textarea>
<button onclick="salvarHorario()">Salvar</button>
</div>
</div>

<!-- METAS -->
<div id="metas" style="display:none">
<div class="card">
<input id="meta"><input id="prog" placeholder="%">
<button onclick="addMeta()">Adicionar</button>
<div id="listaMetas"></div>
</div>
</div>

<!-- NOTAS -->
<div id="notas" style="display:none">
<div class="card">
<input id="nota"><button onclick="addNota()">Adicionar</button>
<div id="grafico"></div>
</div>
</div>

<!-- DADOS -->
<div id="dados" style="display:none">
<div class="card">
<input id="nome"><input id="escola">
<textarea id="info"></textarea>
<button onclick="salvarDados()">Salvar</button>
</div>
</div>

</div>

<script>

/* DADOS */
let db = JSON.parse(localStorage.getItem("db")) || {
tarefas:[], materias:[], metas:[], notas:[],
dias:{}, anotacao:"", horario:"", dados:{}
};

function salvar(){localStorage.setItem("db",JSON.stringify(db))}

/* MENU */
function mostrar(id){
document.querySelectorAll(".main > div").forEach(d=>d.style.display="none");
document.getElementById(id).style.display="block";
}

/* TAREFAS */
function addTarefa(){
db.tarefas.push(tarefa.value); tarefa.value="";
salvar(); renderTarefas();
}
function renderTarefas(){
tarefas.innerHTML="";
db.tarefas.forEach((t,i)=>{
tarefas.innerHTML+=`${t} <button onclick="delT(${i})">X</button><br>`;
});
}
function delT(i){db.tarefas.splice(i,1); salvar(); renderTarefas()}

/* ANOTACAO */
function salvarAnotacao(){db.anotacao=anotacao.value; salvar()}
anotacao.value=db.anotacao;

/* MATERIAS */
function addMateria(){
db.materias.push({nome:matNome.value,tipo:matTipo.value});
salvar(); renderMaterias();
}
function renderMaterias(){
listaMaterias.innerHTML="";
db.materias.forEach((m,i)=>{
listaMaterias.innerHTML+=`
<div class="materia">
${m.nome} (${m.tipo})
<button onclick="delM(${i})">X</button>
</div>`;
});
}
function delM(i){db.materias.splice(i,1); salvar(); renderMaterias()}

/* CALENDARIO 2026 */
let mesAtual=0, ano=2026, tipo="";
function renderCal(){
dias.innerHTML="";
mes.innerText=new Date(ano,mesAtual).toLocaleString('pt-BR',{month:'long'});
let total=new Date(ano,mesAtual+1,0).getDate();
for(let i=1;i<=total;i++){
let c=db.dias[i]||"";
dias.innerHTML+=`<div class="day ${c}" onclick="marcar(${i})">${i}</div>`;
}
}
function setTipo(t){tipo=t}
function marcar(d){
db.dias[d]=tipo; salvar(); renderCal();
}
renderCal();

/* HORARIO */
horarios.value=db.horario;
function salvarHorario(){db.horario=horarios.value; salvar()}

/* METAS */
function addMeta(){
db.metas.push({nome:meta.value,p:prog.value});
salvar(); renderMetas();
}
function renderMetas(){
listaMetas.innerHTML="";
db.metas.forEach((m,i)=>{
listaMetas.innerHTML+=`${m.nome} ${m.p}% <button onclick="delMeta(${i})">X</button><br>`;
});
}
function delMeta(i){db.metas.splice(i,1); salvar(); renderMetas()}

/* NOTAS */
function addNota(){
db.notas.push(nota.value); salvar(); renderNotas();
}
function renderNotas(){
grafico.innerHTML="";
db.notas.forEach(n=>{
grafico.innerHTML+=`<div class="bar" style="width:${n*10}%"></div>`;
});
}

/* DADOS */
function salvarDados(){
db.dados={nome:nome.value,escola:escola.value,info:info.value};
salvar();
}

/* INIT */
renderTarefas();
renderMaterias();
renderMetas();
renderNotas();

</script>

</body>
</html>
