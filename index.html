<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mochila Escolar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{background:#f7f5ff;color:#1e293b}

.header{
background:#ede9fe;
padding:20px;
}

.container{
display:grid;
grid-template-columns:1fr 350px;
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 4px 10px rgba(0,0,0,.05);
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #e5e7eb;
margin-top:8px;
}

button{
background:#a78bfa;
border:none;
color:white;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
margin-top:5px;
}

.cor{
width:12px;
height:12px;
border-radius:50%;
display:inline-block;
margin-right:5px;
}

.tarefa{
background:#f5f3ff;
padding:8px;
border-radius:8px;
margin-top:6px;
font-size:13px;
}

/* horario */

.grade{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

.quadro{
background:#f5f3ff;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

/* calendario */

.calendario{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}

.dia{
background:#f5f3ff;
padding:6px;
border-radius:8px;
min-height:70px;
font-size:11px;
cursor:pointer;
}

.presenca{background:#bbf7d0}
.falta{background:#fecaca}
.prova{background:#ddd6fe}

.topcal{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="header">
<input id="nome" placeholder="Seu nome">
<textarea id="bio" placeholder="Sua bio"></textarea>
</div>

<div class="container">

<div>

<div class="card">
<h3>Adicionar matéria</h3>
<input id="novaMateria">
<button onclick="addMateria()">Adicionar</button>
</div>

<div id="listaMaterias"></div>

<div class="card">
<h3>Meu horário</h3>
<div class="grade" id="horario"></div>
</div>

</div>

<div>

<div class="card">

<div class="topcal">
<button onclick="mes(-1)">◀</button>
<b id="mes"></b>
<button onclick="mes(1)">▶</button>
</div>

<div class="calendario" id="calendario"></div>

<div id="stats"></div>

</div>

</div>

</div>

<script>

const cores=[
"#a78bfa","#60a5fa","#34d399",
"#f472b6","#fbbf24","#fb7185"
]

let hoje=new Date()

let db=JSON.parse(localStorage.getItem("mochila"))||{
perfil:{nome:"",bio:""},
materias:[],
horario:Array(9).fill(""),
cal:{}
}

function save(){
localStorage.setItem("mochila",JSON.stringify(db))
}

/* perfil */

nome.value=db.perfil.nome
bio.value=db.perfil.bio

nome.oninput=()=>{
db.perfil.nome=nome.value
save()
}

bio.oninput=()=>{
db.perfil.bio=bio.value
save()
}

/* materias */

function addMateria(){

let nome=novaMateria.value
if(!nome)return

db.materias.push({
nome,
cor:cores[Math.floor(Math.random()*cores.length)],
tarefas:[]
})

novaMateria.value=""
save()
render()

}

function addTarefa(i){

let nome=prompt("tarefa")
let data=prompt("YYYY-MM-DD")

if(!nome||!data)return

db.materias[i].tarefas.push({nome,data})

db.materias[i].tarefas.sort(
(a,b)=>new Date(a.data)-new Date(b.data)
)

save()
render()

}

/* horario */

function renderHorario(){

horario.innerHTML=""

db.horario.forEach((h,i)=>{

horario.innerHTML+=`
<div class="quadro"
onclick="editHorario(${i})">
${h||"+"}
</div>
`

})

}

function editHorario(i){
let t=prompt("Aula")
if(t==null)return
db.horario[i]=t
save()
render()
}

/* calendario */

function renderCalendario(){

let ano=hoje.getFullYear()
let mes=hoje.getMonth()

mes.innerText=
hoje.toLocaleString("pt-br",{month:"long",year:"numeric"})

let dias=new Date(ano,mes+1,0).getDate()

calendario.innerHTML=""

let p=0,f=0

for(let d=1;d<=dias;d++){

let key=`${ano}-${mes}-${d}`
let tipo=db.cal[key]||""

if(tipo=="presenca")p++
if(tipo=="falta")f++

let tarefas=""

db.materias.forEach(m=>{
m.tarefas.forEach(t=>{
let dt=new Date(t.data)
if(dt.getDate()==d && dt.getMonth()==mes)
tarefas+="•"+t.nome+"<br>"
})
})

calendario.innerHTML+=`
<div class="dia ${tipo}"
onclick="marcar('${key}')">

<b>${d}</b>
<br>
${tarefas}

</div>
`

}

let total=p+f
let media= total?Math.round(p/total*100):0

stats.innerHTML=`
Presença: ${media}%<br>
Faltas: ${f}
`

}

function marcar(k){

let r=prompt(
1 presença
2 falta
3 prova
0 limpar
)

if(r==1)db.cal[k]="presenca"
else if(r==2)db.cal[k]="falta"
else if(r==3)db.cal[k]="prova"
else delete db.cal[k]

save()
render()

}

function mes(n){
hoje.setMonth(hoje.getMonth()+n)
render()
}

/* render */

function render(){

listaMaterias.innerHTML=""

db.materias.forEach((m,i)=>{

let tarefas=m.tarefas.map(t=>
`<div class="tarefa">${t.nome}<br>${t.data}</div>`
).join("")

listaMaterias.innerHTML+=`
<div class="card">
<h3>
<span class="cor" style="background:${m.cor}"></span>
${m.nome}
</h3>

<button onclick="addTarefa(${i})">
Nova tarefa
</button>

${tarefas}

</div>
`

})

renderHorario()
renderCalendario()

}

render()

</script>
  
<a href="d-h.html"><button class="bnt"> Direitos Humanos </button></a>
</body>
</html>
