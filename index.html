<script>

let pastaAtual="Exatas"
let materiaAtual=null

let data = JSON.parse(localStorage.getItem("mochila")) || {
perfil:{nome:"",bio:""},
dark:false,
pastas:{
Exatas:[],
Humanas:[],
Curso:[],
Itinerario:[]
}
}

function salvar(){
localStorage.setItem("mochila",JSON.stringify(data))
}

function abrirPasta(nome){
pastaAtual=nome
materiaAtual=null
render()
}

function addMateria(){

let nome=document.getElementById("materiaNome").value.trim()
let pasta=document.getElementById("categoria").value

if(!nome) return

data.pastas[pasta].push({
nome:nome,
tarefas:[]
})

/* IMPORTANTE: muda para a pasta escolhida */
pastaAtual=pasta
materiaAtual=null

document.getElementById("materiaNome").value=""

salvar()
render()
}

function abrirMateria(i){
materiaAtual=i
render()
}

function addTarefa(){

let nome=prompt("Nome da tarefa")
if(!nome) return

let dataT=prompt("Data YYYY-MM-DD")

data.pastas[pastaAtual][materiaAtual].tarefas.push({
nome,
data:dataT,
done:false
})

salvar()
render()
}

function toggle(i){
let t=data.pastas[pastaAtual][materiaAtual].tarefas[i]
t.done=!t.done
salvar()
render()
}

function removerTarefa(i){
data.pastas[pastaAtual][materiaAtual].tarefas.splice(i,1)
salvar()
render()
}

function removerMateria(i){
data.pastas[pastaAtual].splice(i,1)
materiaAtual=null
salvar()
render()
}

function render(){

let area=document.getElementById("conteudo")

if(materiaAtual===null){

area.innerHTML=""

data.pastas[pastaAtual].forEach((m,i)=>{

area.innerHTML+=`
<div class="subject">

<strong onclick="abrirMateria(${i})">
${m.nome}
</strong>

<br>

<button class="delete" onclick="removerMateria(${i})">
Excluir
</button>

</div>
`

})

}else{

let m=data.pastas[pastaAtual][materiaAtual]

let tarefas=m.tarefas.map((t,i)=>`
<div class="task">

<div>
${t.nome}
<br>
<small>${t.data||""}</small>
</div>

<div>
<button onclick="toggle(${i})">✓</button>
<button class="delete" onclick="removerTarefa(${i})">x</button>
</div>

</div>
`).join("")

area.innerHTML=`

<div class="card">

<h2>${m.nome}</h2>

<button onclick="addTarefa()">Nova tarefa</button>

${tarefas}

<button onclick="materiaAtual=null;render()">
Voltar
</button>

</div>

`

}

}

render()

</script>
